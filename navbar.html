<style>
    :root {
        --primary: #8B0000;
        --secondary: #D4AF37;
        --accent: #FFD700;
        --light: #FFF8F0;
        --dark: #2C1810;
        --shadow: rgba(139, 0, 0, 0.15);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --gradient: linear-gradient(135deg, #8B0000 0%, #B22222 50%, #8B0000 100%);
    }

    /* Navbar Styles - Desktop */

        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(255, 248, 240, 0.95);

    .main-navbar.hidden {

    .main-navbar.scrolled {

        box-shadow: 0 10px 40px rgba(139, 0, 0, 0.15);
    }

    .navbar-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
    }

    .main-navbar.scrolled .navbar-container {
        padding: 10px 20px;
    }

    .navbar-logo {
        display: flex;
        align-items: center;
        text-decoration: none;
        min-width: 0;
    }

    .navbar-logo:hover {
        transform: scale(1.02);
    }

    .logo-icon img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-right: 12px;
        transition: var(--transition);
    }

    .main-navbar.scrolled .logo-icon img {
        width: 50px;
        height: 50px;
    }

    .logo-text {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--primary);
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    .logo-text span {
        color: var(--secondary);
        position: relative;
    }

    .logo-text span::after {
        content: '';
        position: absolute;
        bottom: -3px;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--accent);
        border-radius: 2px;
    }

    /* Navigation Menu - Desktop */
    .navbar-menu {
        display: flex;
        list-style: none;
        gap: 26px;

        text-decoration: none;

    .navbar-menu li a i {

    .navbar-menu li a::before {

        transition: var(--transition);

    .navbar-menu li a:hover {

    .navbar-menu li a:hover::before,

    /* Bottom Navigation - Mobile */

<script>
    // Penanganan Active State (tetap ada di sini agar segera dieksekusi setelah fetch)
    (function () {
        function normalizePath(pathname) {
            const p = (pathname || '').replace(/\\/g, '/');
            if (p.endsWith('/') || p === '') return 'index';
            const file = p.split('/').pop();
            return file.endsWith('.html') ? file.slice(0, -5) : file;
        }

        function currentPageKey() {
            const file = normalizePath(window.location.pathname);
            if (file === 'index' || file === '') return 'beranda';
            if (file === 'gallery') return 'galeri';
            if (file === 'location') return 'lokasi';
            if (file === 'kontak') return 'kontak';
            return 'beranda';
        }

        function setActiveByKey(key) {
            document.querySelectorAll('.bottom-nav-link, .navbar-menu a').forEach(a => {
                a.classList.remove('active');
                if (a.getAttribute('data-page') === key) a.classList.add('active');
            });
        }

        function setActiveForCurrentPage() {
            setActiveByKey(currentPageKey());
        }

        // Index: ganti aktif berdasarkan section yg terlihat
        function bindIndexSectionObserver() {
            const file = normalizePath(window.location.pathname);
            if (file !== 'index') return;

            const maps = document.getElementById('maps');
            if (!maps) return;

            const obs = new IntersectionObserver((entries) => {
                const visible = entries
                    .filter(e => e.isIntersecting)
                    .sort((a, b) => (b.intersectionRatio || 0) - (a.intersectionRatio || 0));

                if (visible.length === 0) return;

                const id = visible[0].target.id;
                if (id === 'maps') setActiveByKey('lokasi');
                else setActiveByKey('beranda');
            }, { threshold: [0.25, 0.5, 0.75] });

            obs.observe(maps);
        }

        // Update display mode + body padding
        function updateNavigation() {
            const navbar = document.getElementById('mainNavbar');
            const bottomNav = document.getElementById('bottomNav');
            if (!navbar || !bottomNav) return;

            if (window.innerWidth <= 992) {
                navbar.style.display = 'none';
                bottomNav.style.display = 'block';
                document.body.style.paddingBottom = '70px';
            } else {
                navbar.style.display = 'block';
                bottomNav.style.display = 'none';
                document.body.style.paddingBottom = '0';
            }
        }

        // Hide navbar on scroll (desktop)
        let lastScrollTop = 0;
        function handleScroll() {
            const navbar = document.getElementById('mainNavbar');
            if (!navbar) return;

            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            if (window.innerWidth > 992) {
                if (scrollTop > 100) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');

                const navbarHeight = navbar.offsetHeight || 0;
                if (scrollTop > lastScrollTop && scrollTop > navbarHeight) navbar.classList.add('hidden');
                else navbar.classList.remove('hidden');
            }

            lastScrollTop = scrollTop;
        }

        document.addEventListener('DOMContentLoaded', function () {
            setActiveForCurrentPage();
            updateNavigation();
            bindIndexSectionObserver();

            window.addEventListener('resize', updateNavigation);
            window.addEventListener('scroll', handleScroll);
            window.addEventListener('hashchange', setActiveForCurrentPage);
        });

        if (document.readyState !== 'loading') {
            setActiveForCurrentPage();
            updateNavigation();
        }
    })();
</script>
