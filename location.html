<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="js/router.js"></script>
    

    <!-- Primary SEO -->
    <title>Lokasi Workshop Penyewaan Baju Adat Jambi - Kota Jambi</title>
    <meta name="description"
        content="Temukan lokasi workshop Kostum Adat Nusantara di Kota Jambi. Jasa sewa baju jambi terlengkap dan terpercaya. Cek rute Google Maps di sini!" />
    <meta name="keywords"
        content="lokasi sewa baju jambi, alamat penyewaan jambi, baju adat jambi, sewa jas jambi, persewaan jambi, lebak bandung jambi" />
    <meta name="robots" content="index,follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Canonical (ganti dengan domain asli saat publish) -->
    <link rel="canonical" href="https://kostum-adatnusantara.vercel.app/location" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:site_name" content="Kostum Adat Nusantara" />
    <meta property="og:title" content="Lokasi Sewa Baju Adat Jambi #1 - Lebak Bandung | Kostum Adat Nusantara" />
    <meta property="og:description"
        content="Kunjungi workshop Kostum Adat Nusantara di Lebak Bandung, Jambi. Tempat sewa baju adat, Jas, dan Jasco terlengkap di Jambi. Cek peta lokasi di sini!" />
    <meta property="og:url" content="https://kostum-adatnusantara.vercel.app/location" />
    <meta property="og:image" content="https://kostum-adatnusantara.vercel.app/image/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lokasi Sewa Baju Adat Jambi - Kostum Adat Nusantara" />
    <meta name="twitter:description"
        content="Lihat koleksi sewa pakaian adat Nusantara, Jas, dan Jasco terlengkap di Jambi." />
    <meta name="twitter:image" content="https://kostum-adatnusantara.vercel.app/image/logo.png" />

    <!-- Favicon -->
    <link rel="icon" href="image/logo.png" type="image/png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary: #8B0000;
            --secondary: #D4AF37;
            --accent: #FFD700;
            --light: #FFF8F0;
            --dark: #2C1810;
            --shadow: rgba(139, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient: linear-gradient(135deg, #8B0000 0%, #B22222 50%, #8B0000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Header Styles */
        .location-header {
            background: var(--gradient);
            color: white;
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .location-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: cover;
        }

        .location-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 15px;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .location-header p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            opacity: 0.9;
        }

        /* Main Content */
        .location-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Map Section */
        .map-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 4px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .map-wrapper {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            height: 500px;
            position: relative;
        }

        #locationMap {
            width: 100%;
            height: 100%;
        }

        .map-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 300px;
            z-index: 1000;
        }

        .map-overlay h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .map-overlay p {
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        .map-overlay i {
            color: var(--secondary);
            width: 20px;
            margin-right: 10px;
        }

        /* Contact Info Section */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .contact-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
            text-align: center;
        }

        .contact-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .contact-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
        }

        .contact-card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .contact-card p {
            color: var(--dark);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .contact-card a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-block;
            margin-top: 10px;
        }

        .contact-card a:hover {
            color: var(--secondary);
            transform: translateX(5px);
        }

        /* Maps Button */
        .maps-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #27ae60; /* Google Maps Green */
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);
        }

        .maps-btn:hover {
            background: #219150;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3);
            color: white;
        }

        .maps-btn i {
            font-size: 1.1rem;
        }
        /* Business Hours */
        .hours-section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 60px;
        }

        .hours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .day-card {
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: var(--transition);
        }

        .day-card:hover {
            background: var(--primary);
            color: white;
        }

        .day-card h4 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: inherit;
        }

        .day-card p {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .day-card.current-day {
            background: var(--gradient);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.2);
        }

        /* Contact Form */
        .form-section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        .submit-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(139, 0, 0, 0.3);
            background: linear-gradient(135deg, #B22222 0%, #8B0000 100%);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .location-header h1 {
                font-size: 2.5rem;
            }

            .location-header {
                padding: 100px 20px 40px;
            }

            .section-title {
                font-size: 2rem;
            }

            .map-wrapper {
                height: 400px;
            }

            .map-overlay {
                position: relative;
                top: 0;
                left: 0;
                max-width: 100%;
                margin-bottom: 20px;
            }

            .contact-card,
            .hours-section,
            .form-section {
                padding: 25px;
            }

            .location-container {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .location-header h1 {
                font-size: 2rem;
            }

            .map-wrapper {
                height: 300px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .hours-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Include your existing navbar CSS here */
        /* Copy all navbar styles from your original code */
        /* I'll include a simplified version for reference */
        .main-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 248, 240, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }

        .main-navbar.hidden {
            transform: translateY(-100%);
        }

        .main-navbar.scrolled {
            background: rgba(255, 248, 240, 0.98);
            box-shadow: 0 10px 40px rgba(139, 0, 0, 0.15);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-right: 12px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
        }

        .logo-text span {
            color: var(--secondary);
        }

        /* Bottom nav styles */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            z-index: 1001;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 992px) {
            .main-navbar {
                display: none;
            }

            .bottom-nav {
                display: block;
            }

            body {
                padding-bottom: 70px;
            }
        }
    </style>
</head>

<body>
    <!-- Include Navbar (partial) -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <header class="location-header">
        <h1><i class="fas fa-map-marker-alt"></i> Lokasi Penyewaan Baju Adat Jambi</h1>
        <p>Workshop pusat sewa baju jambi, Jas, dan Jasco. Silakan kunjungi alamat kami di Kota Jambi.</p>
    </header>

    <main class="location-container">
        <!-- Map Section -->
        <section class="map-section" id="maps">
            <h2 class="section-title">Lokasi Workshop</h2>
            <div class="map-wrapper">
                <div id="locationMap"></div>
                <div class="map-overlay">
                    <h3><i class="fas fa-store"></i> Kostum Adat Nusantara</h3>
                    <p><i class="fas fa-map-pin"></i> Jl. Penyengat, Perumahan Kreasi Pura, Lebak Bandung</p>
                    <p><i class="fas fa-city"></i> Kota Jambi, Jambi</p>
                    <a href="https://www.google.com/maps?q=-1.6085411,103.605985" target="_blank" class="maps-btn">
                        <i class="fas fa-directions"></i> Lihat di Google Maps
                    </a>
                </div>
            </div>
        </section>


    </main>

    <!-- Include Footer (partial) -->
    <div id="footer-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Load navbar & footer partials
        document.addEventListener('DOMContentLoaded', function () {
            fetch('navbar.html?v=1.1')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('navbar-container').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('navbar-container').innerHTML = '';
                });

            fetch('footer.html?v=1.1')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('footer-container').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('footer-container').innerHTML = '';
                });
        });

        // Initialize Map
        function initMap() {
            // Koordinat Lokasi Baru dari USER
            const jambiLocation = [-1.6085411, 103.605985];

            // Create map
            const map = L.map('locationMap').setView(jambiLocation, 15);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add kostum marker
            const kostumIcon = L.divIcon({
                className: 'kostum-marker',
                html: '<i class="fas fa-map-marker-alt" style="color: #8B0000; font-size: 40px;"></i>',
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            // Add marker to map
            L.marker(jambiLocation, { icon: kostumIcon })
                .addTo(map)
                .bindPopup(`
                    <div style="text-align: center; font-family: 'Inter', sans-serif;">
                        <b style="color: #8B0000; font-size: 1.1rem; display: block; margin-bottom: 5px;">Kostum Adat Nusantara</b>
                        <p style="margin-bottom: 10px; font-size: 0.9rem;">Sewa Pakaian Adat, Jas & Jasco</p>
                        <a href="https://www.google.com/maps?q=-1.6085411,103.605985" target="_blank" 
                           style="background: #27ae60; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 5px;">
                            <i class="fas fa-directions"></i> Buka di Google Maps
                        </a>
                    </div>
                `)
                .openPopup();

            // Add circle around location
            L.circle(jambiLocation, {
                color: '#8B0000',
                fillColor: '#8B0000',
                fillOpacity: 0.1,
                radius: 150
            }).addTo(map);
        }

        // Handle Contact Form Submission
        function handleFormSubmit(event) {
            event.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            // Here you would typically send the data to a server
            // For now, just show an alert
            alert('Terima kasih! Pesan Anda telah dikirim. Kami akan menghubungi Anda segera.');

            // Reset form
            document.getElementById('contactForm').reset();
        }

        // Navigation Script: di-handle oleh navbar.html partial
        function initNavigation() {
            // no-op
            document.getElementById('contactForm')?.addEventListener('submit', handleFormSubmit);
        }

        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', function () {
            initMap();
            initNavigation();

            // Smooth scroll for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    if (this.getAttribute('href') === '#') return;

                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);

                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 100,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>
