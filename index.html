    <style>
        :root {
            --primary: #8B0000;
            --secondary: #D4AF37;
            --accent: #FFD700;
            --light: #FFF8F0;
            --dark: #2C1810;
            --text: #333333;
            --shadow: rgba(139, 0, 0, 0.15);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient: linear-gradient(135deg, #8B0000 0%, #B22222 50%, #8B0000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 80px 20px;
            background: linear-gradient(rgba(44, 24, 16, 0.9), rgba(139, 0, 0, 0.85)),
                url('/image/bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(255,255,255,0.05)"/></svg>');
            background-size: cover;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }

        .hero h1 {
            font-size: 4.5rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            opacity: 0.95;
            max-width: 760px;
            margin-left: auto;
            margin-right: auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .hero-btns {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 40px;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 50px;
            transition: var(--transition);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 20px 40px rgba(139, 0, 0, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--secondary);
            color: var(--dark);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .container {
                max-width: 1000px;
            }

            .hero h1 {
                font-size: 4rem;
            }
        }

        @media (max-width: 992px) {
            .container {
                max-width: 750px;
            }

            .hero h1 {
                font-size: 3rem;
            }

            .hero p {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 30px;
            }

            .hero {
                padding: 100px 30px 60px;
            }

            .hero h1 {
                font-size: 2.8rem;
            }

            .hero p {
                font-size: 1.15rem;
            }

            .hero-btns {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .btn {
                width: 100%;
                max-width: 360px;
                text-align: center;
                padding: 18px 28px;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0 25px;
            }

            .hero {
                padding: 90px 25px 50px;
            }

            .hero h1 {
                font-size: 2.4rem;
            }

            .hero p {
                font-size: 1.05rem;
            }
        }
    </style>
</head>

<body>
    <!-- Include Navbar -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <h1>Kostum Adat Nusantara</h1>
                <p>Melestarikan warisan budaya Jambi melalui pakaian adat tradisional yang elegan dan autentik. Temukan
                    koleksi terbaik baju adat Jambi dengan kualitas terbaik dan harga terjangkau.</p>
                <div class="hero-btns">
                    <a href="about.html" class="btn btn-outline">
                        <i class="fa-solid fa-shirt"></i> Tentang Baju
                    </a>
                    <a href="gallery.html" class="btn btn-outline">
                        <i class="fas fa-shopping-bag"></i> Lihat Galeri
                    </a>
                    <a href="location.html" class="btn">
                        <i class="fa-solid fa-location-dot"></i> Lokasi
                    </a>
                    <a href="kontak.html" class="btn">
                        <i class="fa-solid fa-phone"></i> Kontak
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Include Footer -->
    <div id="footer-container"></div>

    <script>
        // Load navbar and footer
        document.addEventListener('DOMContentLoaded', function () {
            fetch('navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar-container').innerHTML = data;
                });

            fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-container').innerHTML = data;
                });
        });
    </script>
</body>

</html>
